<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" role="img" aria-label="">
  <defs>
    <linearGradient id="fogBackGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F5F1E8" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#FAF8F5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softFog" x="-10%" y="-10%" width="120%" height="120%">
