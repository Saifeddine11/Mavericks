<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" role="img" aria-label="">
  <defs>
    <linearGradient id="fogFrontGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FAF8F5" stop-opacity="0.92"/>
      <stop offset="75%" stop-color="#F5F1E8" stop-opacity="0.35"/>
