<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%"  stop-color="#F5F1E8"/>
      <stop offset="55%" stop-color="#E8D9C0"/>
      <stop offset="100%" stop-color="#C8B38A"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.75" cy="0.32" r="0.45">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="0.18" cy="0.85" r="0.55">
      <stop offset="0%"  stop-color="#081826" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#081826" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.95   0 0 0 0 0.9   0 0 0 0 0.82   0 0 0 0.07 0"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#warm)"/>
  <rect width="1920" height="1080" fill="url(#sun)"/>
  <rect width="1920" height="1080" fill="url(#shade)"/>
  <rect width="1920" height="1080" filter="url(#grain)" opacity="0.18"/>
</svg>
